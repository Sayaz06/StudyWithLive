<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StressTogether</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#020617" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .convert-group {
      margin: 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .convert-group input { width: 18px; height: 18px; cursor: pointer; }
    .hidden { display: none !important; }
    .status-msg { font-size: 0.8rem; color: #94a3b8; margin-top: 4px; display: block; }
  </style>
</head>
<body>
  <div id="page-login" class="page">
    <div class="container">
      <h1 class="app-title">StressTogether</h1>
      <p class="subtext">Simpan Video & MP3 — pendek hingga panjang. Login untuk mula.</p>
      <button id="btn-google" class="btn-primary">Login dengan Google</button>
    </div>
  </div>

  <div id="page-home" class="page hidden">
    <header class="home-header">
      <div class="header-left"><h2 class="brand">StressTogether</h2></div>
      <div class="header-right"><button id="btn-logout" class="btn-ghost">Logout</button></div>
    </header>

    <main class="home-main">
      <div class="toolbar">
        <input id="search" type="search" class="input" placeholder="Cari rakaman..." />
        <div class="upload-group">
          <button id="btn-upload" class="btn-primary">Tambah Fail</button>
          <input id="file-input" type="file" accept="video/*,audio/*" class="hidden" />
        </div>
      </div>

      <section id="upload-preview" class="upload-preview hidden">
        <h3 class="section-title">Preview Fail</h3>
        <div class="preview-card">
          <video id="preview-video" controls class="video" style="max-height: 200px;"></video>
          <div class="preview-meta">
            <label class="label">Tajuk Simpanan</label>
            <input id="preview-title" class="input" placeholder="Masukkan tajuk..." />
            
            <div id="convert-container" class="convert-group">
              <input type="checkbox" id="check-convert">
              <label for="check-convert">Tukar ke MP3 (Audio Sahaja)</label>
            </div>

            <div class="preview-actions">
              <button id="btn-save-upload" class="btn-primary">Simpan ke Cloud</button>
              <button id="btn-cancel-upload" class="btn-ghost">Batal</button>
            </div>
            
            <div id="upload-progress" class="progress hidden">
              <div id="upload-bar" class="progress-bar"></div>
              <span id="upload-label" class="progress-label">Sedia...</span>
            </div>
            <span id="process-note" class="status-msg hidden">*Jangan tutup tab semasa proses menukar audio (Rakaman Live).</span>
          </div>
        </div>
      </section>

      <section id="gallery" class="gallery"></section>
    </main>
  </div>

  <div id="player-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="player-title" class="section-title"></h3>
        <button id="btn-close-player" class="btn-ghost">Tutup</button>
      </div>
      <video id="player" class="video" controls></video>
      <div class="player-controls">
        <div class="control-group">
          <label class="label">Kelajuan</label>
          <select id="playback-rate" class="input small">
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
          </select>
        </div>
        <div class="control-group">
          <button id="btn-skip-back" class="btn-ghost">« 10s</button>
          <button id="btn-skip-forward" class="btn-ghost">10s »</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./firebase.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
